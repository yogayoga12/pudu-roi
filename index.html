<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロボット導入 ROI診断 | ニッシン・パーテクチュアル × PUDU ROBOTICS</title>
<meta name="description" content="搬送・清掃ロボットの投資対効果を3ステップで診断。PUDU ROBOTICS T300/CC1の導入効果を可視化します。">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow-y: scroll; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  button { transition: all 0.15s ease; }
  button:hover { opacity: 0.85; }
  @media print { body { background: #fff !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ===== Evidence-based presets ===== */
/* Source: 財務省「法人企業統計調査」2024年度 製造業全規模 労働生産性995万円/年 ≈ 5,000円/h
   中小企業白書2025: 中小企業の労働分配率≈80% → 付加価値 ≈ 人件費 × 1.25
   経済構造実態調査2024: 製造業付加価値額110兆円、従業者数740万人 */

const VALUE_PRESETS = [
  { id: "general", label: "一般作業員", value: 2500, desc: "搬送・梱包・清掃等", source: "中小製造業平均（約500万円/年÷2,000h）" },
  { id: "operator", label: "機械オペレーター", value: 3500, desc: "NC・プレス・成形機等の運転", source: "中小製造業 機械工（約700万円/年÷2,000h）" },
  { id: "craftsman", label: "熟練技能者・エンジニア", value: 5000, desc: "金型・溶接・精密加工等の専門技能", source: "製造業全規模平均（995万円/年÷2,000h、法人企業統計2024）" },
  { id: "multi", label: "多能工・高度技能者", value: 7000, desc: "5軸加工・放電加工・段取り多能工", source: "高付加価値製造業上位（約1,400万円/年÷2,000h）" },
  { id: "sales", label: "営業・接客スタッフ", value: 4000, desc: "顧客対応・販売", source: "小売業・サービス業平均（約770万円/年÷2,000h、法人企業統計）" },
  { id: "custom", label: "自分で入力する", value: 0, desc: "", source: "" },
];

const RECRUIT_PRESETS = [
  { id: "low", label: "ハローワーク中心", cost: 100000, desc: "求人掲載無料＋面接等の内部コスト", source: "ハローワーク求人掲載は無料。内部コスト（担当者人件費・面接対応等）のみで約10万円（マイナビ中途採用状況調査2025）" },
  { id: "mid", label: "求人媒体利用", cost: 290000, desc: "Indeed・タウンワーク等", source: "中途1人あたり平均採用コスト約28.9万円（マイナビ中途採用状況調査2024・2023年実績）" },
  { id: "high", label: "人材紹介利用", cost: 900000, desc: "紹介手数料＝年収の30〜35%", source: "年収350万円の場合 手数料30%＝約105万円。中途平均80〜100万円（マイナビ中途採用状況調査2025・2024年実績）" },
];

const PAIN_POINTS = [
  { id: "backpain", label: "腰痛・疲労", icon: "🏋️" },
  { id: "hiring", label: "採用が困難", icon: "🔍" },
  { id: "turnover", label: "高い離職率", icon: "🚪" },
  { id: "overtime", label: "残業が発生", icon: "⏰" },
  { id: "quality", label: "本業に集中できない", icon: "🎯" },
  { id: "downtime", label: "機械の材料待ち", icon: "🏭" },
  { id: "cost", label: "人件費の上昇", icon: "📊" },
  { id: "hygiene", label: "清掃・衛生管理", icon: "🧹" },
];

const init = {
  companyName: "", contactName: "", employeeCount: "",
  robotType: "t300",  // "t300" or "cc1"
  facilityType: "factory",
  // T300 Factory
  machineCount: "", callsPerDay: "4", fetchTimeMin: "10",
  // T300 Warehouse
  dailyOrders: "", transportTimeMin: "5",
  // CC1
  cleaningTimesPerDay: "2", cleaningMinPerTime: "30", cleaningArea: "",
  // Common
  staffCount: "", hourlyWage: "1800", workDays: "240",
  // Layer 2
  recruitPreset: "mid", turnoverRate: "15",
  // Layer 3
  valuePreset: "craftsman", customValue: "",
  // Robot cost (営業担当入力 - 架台のみ)
  rackCost: "",
  t300Units: "1", cc1Units: "1",
  pains: [], notes: "",
};

function calc(f) {
  const isT300 = f.robotType === "t300";
  const isFact = f.facilityType === "factory";
  const wage = parseFloat(f.hourlyWage) || 1800;
  const days = parseFloat(f.workDays) || 240;
  const staff = parseFloat(f.staffCount) || 1;
  const emp = parseFloat(f.employeeCount) || 20;
  const vp = VALUE_PRESETS.find(v => v.id === f.valuePreset) || VALUE_PRESETS[2];
  const valuePerH = f.valuePreset === "custom" ? (parseFloat(f.customValue) || 3000) : vp.value;
  const rp = RECRUIT_PRESETS.find(r => r.id === f.recruitPreset) || RECRUIT_PRESETS[1];
  const turnover = (parseFloat(f.turnoverRate) || 15) / 100;

  let totalCalls, fetchMinDay, taskLabel;
  if (isT300) {
    taskLabel = "搬送";
    if (isFact) {
      const mc = parseFloat(f.machineCount) || 5;
      const cpd = parseFloat(f.callsPerDay) || 4;
      const ftm = parseFloat(f.fetchTimeMin) || 10;
      totalCalls = mc * cpd;
      fetchMinDay = totalCalls * ftm;
    } else {
      const ord = parseFloat(f.dailyOrders) || 0;
      const ttm = parseFloat(f.transportTimeMin) || 5;
      totalCalls = ord;
      fetchMinDay = ord * ttm;
    }
  } else {
    // CC1
    taskLabel = "清掃";
    const timesDay = parseFloat(f.cleaningTimesPerDay) || 2;
    const minPer = parseFloat(f.cleaningMinPerTime) || 30;
    totalCalls = timesDay;
    fetchMinDay = timesDay * minPer;
  }

  const fetchHYear = fetchMinDay / 60 * days;

  // L1
  const l1_labor = Math.round(fetchHYear * wage * 1.15);
  const l1 = l1_labor;
  let l1_formulas;
  if (isT300 && isFact) {
    l1_formulas = [
      { l: "1日の呼出し回数", f: `${f.machineCount}工程 × ${f.callsPerDay}回`, r: `${totalCalls}回/日` },
      { l: "エンジニアの搬送時間削減", f: `${totalCalls}回 × ${f.fetchTimeMin}分 × ${days}日 ÷ 60`, r: `${Math.round(fetchHYear)}h/年`, n: "搬送所要時間には移動・積降ろし・立ち話等すべて含みます" },
      { l: "人件費削減（社保15%込）", f: `${Math.round(fetchHYear)}h × ${fm(wage)}円 × 1.15`, r: `${fm(l1_labor)}円`, c: true, n: "社会保険料の事業主負担は法定福利費として給与の約15%（厚労省統計）" },
    ];
  } else if (isT300) {
    l1_formulas = [
      { l: "1日の搬送時間", f: `${f.dailyOrders}回 × ${f.transportTimeMin}分`, r: `${fetchMinDay}分/日`, n: "搬送所要時間には移動・積降ろし・立ち話等すべて含みます" },
      { l: "年間搬送時間", f: `${(fetchMinDay/60).toFixed(1)}h × ${days}日`, r: `${Math.round(fetchHYear)}h/年` },
      { l: "人件費削減（社保15%込）", f: `${Math.round(fetchHYear)}h × ${fm(wage)}円 × 1.15`, r: `${fm(l1_labor)}円`, c: true, n: "社会保険料の事業主負担は法定福利費として給与の約15%（厚労省統計）" },
    ];
  } else {
    l1_formulas = [
      { l: "1日の清掃時間", f: `${f.cleaningTimesPerDay}回/日 × ${f.cleaningMinPerTime}分`, r: `${fetchMinDay}分/日` },
      { l: "年間清掃時間", f: `${(fetchMinDay/60).toFixed(1)}h × ${days}日`, r: `${Math.round(fetchHYear)}h/年` },
      { l: "人件費削減（社保15%込）", f: `${Math.round(fetchHYear)}h × ${fm(wage)}円 × 1.15`, r: `${fm(l1_labor)}円`, c: true, n: "清掃スタッフの人件費＋社会保険料の事業主負担15%を削減" },
    ];
  }

  // L2
  const leavers = staff * turnover;
  const recruitTotal = Math.round(leavers * rp.cost);
  const trainCost = Math.round(leavers * 2 * 40 * (wage / 60) * 0.5);
  const miscCost = Math.round(leavers * 50000);
  const l2 = recruitTotal + trainCost + miscCost;
  const l2_formulas = [
    { l: "年間離職者数", f: `${staff}名 × ${(turnover*100).toFixed(0)}%`, r: `${leavers.toFixed(1)}名/年` },
    { l: "① 採用コスト", f: `${fm(rp.cost)}円/人 × ${leavers.toFixed(1)}名`, r: `${fm(recruitTotal)}円`, c: true, n: rp.source },
    { l: "② 教育コスト", f: `${leavers.toFixed(1)}名 × 2週 × 40h × 生産性50%`, r: `${fm(trainCost)}円`, c: true, n: "新人は教育期間中、既存社員の50%の生産性と想定（OJT中は指導者の生産性も低下）" },
    { l: "③ 退職に伴う組織コスト", f: `${leavers.toFixed(1)}名 × 5万円`, r: `${fm(miscCost)}円`, c: true, n: "内訳：退職手続き事務1.5万円＋引継ぎ期間の生産性低下2万円＋残メンバーの負荷増・士気低下1.5万円（エン・ジャパン「退職コスト調査」等を参考に中小企業向けに保守的に算出）" },
  ];

  // L3
  const l3 = Math.round(fetchHYear * valuePerH);
  const realloc = isT300
    ? (isFact ? "エンジニアが搬送→本来業務（加工・段取り等）に戻る" : "搬送→付加価値業務（接客・検品等）に転換")
    : "清掃→付加価値業務（接客・製造・品質管理等）に転換";
  const l3_formulas = [
    { l: realloc, f: `年間 ${Math.round(fetchHYear)}時間が本来業務に戻る`, r: "" },
    { l: "1時間あたり付加価値", f: `${vp.label}：${fm(valuePerH)}円/h`, r: "", n: vp.source || "手入力値" },
    { l: "年間の付加価値創造額", f: `${Math.round(fetchHYear)}h × ${fm(valuePerH)}円/h`, r: `${fm(l3)}円`, c: true },
  ];

  const total = l1 + l2 + l3;

  // Fixed pricing (税別)
  const units = isT300 ? (parseFloat(f.t300Units) || 1) : (parseFloat(f.cc1Units) || 1);
  const bodyPrice = isT300 ? 3700000 : 2950000;  // T300: 370万, CC1: 295万
  const maintPack = 1200000;  // 5年保守パック: 120万
  const rackPrice = (parseFloat(f.rackCost) || 0) * 10000;
  const robotCost = (bodyPrice + maintPack) * units + rackPrice;  // 本体+保守+架台
  const annualMaint = Math.round(maintPack * units / 5);  // 保守パック年換算
  const annualCost = Math.round(bodyPrice * units / 5 + annualMaint + (rackPrice > 0 ? rackPrice / 5 : 0));
  const brkMo = total > 0 && robotCost > 0 ? Math.ceil(robotCost / (total / 12)) : 0;

  let cat = "5人以下", sub = 750, subW = 1000;
  if (emp > 100) { cat = "101人以上"; sub = 8000; subW = 10000; }
  else if (emp > 50) { cat = "51〜100人"; sub = 5000; subW = 6500; }
  else if (emp > 20) { cat = "21〜50人"; sub = 3000; subW = 4000; }
  else if (emp > 5) { cat = "6〜20人"; sub = 1500; subW = 2000; }

  return { l1, l1_formulas, l2, l2_formulas, l3, l3_formulas, total, brkMo, fetchHYear: Math.round(fetchHYear), totalCalls, cat, sub, subW, fetchMinDay, robotCost, annualCost, annualMaint, bodyPrice, maintPack, rackPrice, units, taskLabel };
}

function fm(n) { return typeof n === "number" ? n.toLocaleString("ja-JP") : n; }

/* ===== MAIN APP ===== */
function encodeForm(f) {
  const d = { ...f };
  delete d.notes;  // 長文除外
  return btoa(unescape(encodeURIComponent(JSON.stringify(d))));
}
function decodeForm(s) {
  try { return JSON.parse(decodeURIComponent(escape(atob(s)))); } catch { return null; }
}

function App() {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState(init);
  const [salesMode, setSalesMode] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [showPinBox, setShowPinBox] = useState(false);
  const [sent, setSent] = useState(false);
  const SALES_PIN = "1973";
  const s = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const tp = id => setForm(p => ({ ...p, pains: p.pains.includes(id) ? p.pains.filter(x => x !== id) : [...p.pains, id] }));

  // URL復元（みのたんがリンクを開いた時に入力データを復元）
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const d = params.get("d");
    if (d) {
      const restored = decodeForm(d);
      if (restored) {
        setForm(p => ({ ...p, ...restored }));
        setStep(2);  // 直接ROI結果画面へ
        window.history.replaceState({}, "", window.location.pathname);  // URLパラメータをクリア
      }
    }
  }, []);

  const roi = calc(form);
  const isF = form.facilityType === "factory";
  const isT300 = form.robotType === "t300";
  const STEPS = ["基本情報", "お悩み・コスト", "ROI結果"];

  // Google Apps Script URL（デプロイ後に設定）
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzP7W2toua_w39Tzs98FlLLlX_HfcBpDEiX-4kiu83lkB1Slyj1XHThncXHuzWNau7exQ/exec";

  // 診断結果URL生成（営業担当のデータ復元用）
  const getResultURL = () => {
    const base = window.location.origin + window.location.pathname;
    return base + "?d=" + encodeForm(form);
  };

  // 診断結果を送信
  const [sending, setSending] = useState(false);
  const [sendError, setSendError] = useState("");

  const submitResult = () => {
    setSending(true);
    setSendError("");

    const payload = {
      ...form,
      roi_l1: roi.l1,
      roi_l2: roi.l2,
      roi_l3: roi.l3,
      roi_total: roi.total,
      submitted_at: new Date().toISOString(),
    };

    // 隠しiframe + フォーム送信（CORS回避の確実な方法）
    const iframeName = "gas_submit_" + Date.now();
    const iframe = document.createElement("iframe");
    iframe.name = iframeName;
    iframe.style.display = "none";
    document.body.appendChild(iframe);

    const f = document.createElement("form");
    f.method = "POST";
    f.action = GAS_URL;
    f.target = iframeName;

    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "data";
    input.value = JSON.stringify(payload);
    f.appendChild(input);

    document.body.appendChild(f);
    f.submit();
    document.body.removeChild(f);

    // 送信完了とみなす（iframeは数秒後に除去）
    setTimeout(() => {
      try { document.body.removeChild(iframe); } catch(e) {}
    }, 10000);

    setSending(false);
    setSent(true);
  };

  const canNext = () => {
    if (step === 0) return form.companyName && form.employeeCount && form.staffCount && (isT300 ? (isF ? form.machineCount : form.dailyOrders) : form.cleaningTimesPerDay);
    if (step === 1) return form.pains.length > 0;
    return true;
  };


  return (
    <div style={R.root}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
      <header style={R.hdr}>
        <div style={R.hdrIn}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <div style={R.logo}>🤖</div>
            <div>
              <div style={{ fontSize: 15, color: "#00BCD4", letterSpacing: 3, fontWeight: 700 }}>NISSIN PERTECHTUAL × PUDU ROBOTICS</div>
              <div style={{ fontSize: 30, fontWeight: 900 }}>ロボット導入 ROI診断</div>
            </div>
          </div>
        </div>
      </header>

      <div style={R.wrap}>
        <div style={{ display: "flex", gap: 4, marginBottom: 28 }}>
          {STEPS.map((st, i) => (
            <div key={i} style={{ flex: 1, textAlign: "center" }}>
              <div style={{ height: 3, borderRadius: 2, marginBottom: 5, background: i <= step ? "#00BCD4" : "#2A3A54" }} />
              <div style={{ fontSize: 15, color: i <= step ? "#00BCD4" : "#556677", fontWeight: i === step ? 700 : 400 }}>{i + 1}. {st}</div>
            </div>
          ))}
        </div>

        <div style={R.card}>

          {/* STEP 0: Basic + Robot Type + Operations */}
          {step === 0 && <div>
            <ST n="01" t="基本情報" />

            {/* Robot Type Selector */}
            <div style={{ marginBottom: 20 }}>
              <label style={{ fontSize: 16, color: "#8899AA", display: "block", marginBottom: 8 }}>ロボットタイプ</label>
              <div style={{ display: "flex", gap: 10 }}>
                {[
                  { v: "t300", l: "🚛 T300 搬送ロボット", d: "最大300kg搬送・リフティング・追従", price: "本体370万＋5年保守120万（税別）" },
                  { v: "cc1", l: "🧹 CC1 清掃ロボット", d: "掃除＋モップ＋吸引＋UV殺菌", price: "本体295万＋5年保守120万（税別）" },
                ].map(t => (
                  <button key={t.v} onClick={() => s("robotType", t.v)} style={{
                    flex: 1, padding: "14px 12px", borderRadius: 10, border: `2px solid ${form.robotType === t.v ? "#00BCD4" : "#2A3A54"}`,
                    background: form.robotType === t.v ? "rgba(0,188,212,0.1)" : "transparent",
                    color: form.robotType === t.v ? "#00BCD4" : "#8899AA", cursor: "pointer", textAlign: "left"
                  }}>
                    <div style={{ fontSize: 18, fontWeight: 700 }}>{t.l}</div>
                    <div style={{ fontSize: 14, color: "#667788", marginTop: 3 }}>{t.d}</div>
                    {salesMode && <div style={{ fontSize: 13, color: "#4CAF50", marginTop: 4, fontWeight: 600 }}>{t.price}</div>}
                  </button>
                ))}
              </div>
            </div>

            <G>
              <F l="会社名" req v={form.companyName} set={v => s("companyName", v)} ph="株式会社○○" />
              <F l="ご担当者名" v={form.contactName} set={v => s("contactName", v)} ph="山田 太郎" />
              <F l="従業員数（パート含む）" req v={form.employeeCount} set={v => s("employeeCount", v)} ph="20" sf="名" tp="number" />
              <F l={isT300 ? "搬送スタッフ数" : "清掃スタッフ数"} req v={form.staffCount} set={v => s("staffCount", v)} ph="3" sf="名" tp="number" />
              <div>
                <F l={`${isT300 ? "搬送" : "清掃"}スタッフの平均時給`} v={form.hourlyWage} set={v => s("hourlyWage", v)} ph="1800" sf="円" tp="number" />
                <div style={{ fontSize: 14, color: "#667788", marginTop: 4, fontStyle: "italic" }}>
                  📊 埼玉県最低賃金1,141円（2025年11月〜）。中小製造業スタッフ平均1,500〜2,000円（厚労省 毎月勤労統計2024）
                </div>
              </div>
              <div>
                <F l="年間稼働日数" v={form.workDays} set={v => s("workDays", v)} ph="240" sf="日" tp="number" />
                <div style={{ fontSize: 14, color: "#667788", marginTop: 4, fontStyle: "italic" }}>
                  💡 年間休日120日＋有休消化5日＝125日休 → 稼働240日
                </div>
              </div>
            </G>

            {/* T300: facility type + transport inputs */}
            {isT300 ? (<div style={{ marginTop: 16 }}>
              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 16, color: "#8899AA", display: "block", marginBottom: 8 }}>施設タイプ</label>
                <div style={{ display: "flex", gap: 8 }}>
                  {[
                    { v: "factory", l: "🏭 工場", d: "呼出しボタンで各工程へ" },
                    { v: "warehouse", l: "📦 倉庫・店舗・施設", d: "ピッキング→出荷エリアへ" },
                  ].map(t => (
                    <button key={t.v} onClick={() => s("facilityType", t.v)} style={{
                      flex: 1, padding: "10px", borderRadius: 8, border: `2px solid ${form.facilityType === t.v ? "#00BCD4" : "#2A3A54"}`,

          {/* STEP 2: Costs / LAYER 2 detail (optional, can skip) */}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
              <MC l="LAYER 1" t="コスト削減" v={`${fm(roi.l1)}円`} c="#00BCD4" />

            {salesMode ? (
              <div>
                <button onClick={() => downloadProposal(form, roi, isF, isT300)} style={R.btn}>📄 提案書をダウンロード</button>

                </div>

              <div style={{ padding: 20, background: "rgba(0,188,212,0.06)", borderRadius: 12, border: "1px solid rgba(0,188,212,0.15)" }}>
                {sent ? (
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 48, marginBottom: 8 }}>✅</div>
                    <div style={{ fontSize: 20, color: "#4CAF50", fontWeight: 700, marginBottom: 8 }}>送信が完了しました</div>
                    <div style={{ fontSize: 16, color: "#8899AA", lineHeight: 1.8 }}>
                      診断結果に基づいた御社専用の提案書を<br />担当者より改めてお届けいたします。
                    </div>
                    <div style={{ marginTop: 16, padding: 12, background: "rgba(0,188,212,0.08)", borderRadius: 8 }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: "#00BCD4" }}>ニッシン・パーテクチュアル株式会社</div>
                      <div style={{ fontSize: 14, color: "#8899AA", marginTop: 4 }}>代表取締役 中村 稔 ｜ TEL: 048-754-6511</div>
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontSize: 17, color: "#00BCD4", fontWeight: 700, marginBottom: 8 }}>診断結果を送信する</div>
                    <div style={{ fontSize: 14, color: "#8899AA", marginBottom: 16, lineHeight: 1.6 }}>
                      送信いただいた内容をもとに、御社専用のROI提案書を作成してお届けします。
                    </div>
                    <button onClick={submitResult} disabled={sending} style={{
                      width: "100%", padding: "18px", borderRadius: 10, border: "none",
                      background: sending ? "#2A3A54" : "linear-gradient(135deg,#00BCD4,#4CAF50)",
                      color: sending ? "#667788" : "#0F1A30",
                      cursor: sending ? "default" : "pointer", fontWeight: 900, fontSize: 20
                    }}>
                      {sending ? "📡 送信中..." : "📨 診断結果を送信する"}
                    </button>
                    {sendError && <div style={{ fontSize: 14, color: "#FF5252", marginTop: 8 }}>{sendError}</div>}
                    <div style={{ fontSize: 13, color: "#556677", marginTop: 10 }}>※ 送信される内容：会社名・業務データ・ROI試算結果</div>
                  </div>
                )}
              </div>
            )}
          </div>}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
          {step > 0 ? <button onClick={() => setStep(s => s - 1)} style={R.back}>← 戻る</button> : <div />}
          {step < 2 && <button onClick={() => setStep(s => s + 1)} disabled={!canNext()} style={{ ...R.next, background: canNext() ? "#00BCD4" : "#2A3A54", color: canNext() ? "#0F1A30" : "#556677", cursor: canNext() ? "pointer" : "default" }}>次へ →</button>}
        </div>
      </div>

      <footer style={{ textAlign: "center", padding: 16, fontSize: 15, color: "#445566", borderTop: "1px solid #1A2744" }}>
        ニッシン・パーテクチュアル株式会社 ｜ PUDU ROBOTICS 正規代理店 ｜ 048-754-6511
      </footer>
    </div>
  );
}

/* ===== Formula Section ===== */
function FS({ t, c, fs, total }) {
  return (
    <div style={{ background: "#0F1A30", borderRadius: 10, padding: 12, marginBottom: 12, borderLeft: `3px solid ${c}` }}>
      <div style={{ fontSize: 18, fontWeight: 700, color: c, marginBottom: 8 }}>{t}</div>
      {fs.map((f, i) => (
        <div key={i} style={{ marginBottom: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <div style={{ flex: 1 }}>
              <span style={{ fontSize: 17, color: "#AABBCC" }}>{f.l}</span>
              {f.f && <div style={{ fontSize: 15, color: "#556677", fontFamily: "monospace", marginTop: 1 }}>{f.f}</div>}
              {f.n && <div style={{ fontSize: 14, color: "#667788", fontStyle: "italic", marginTop: 1 }}>📊 {f.n}</div>}
            </div>
            {f.r && <div style={{ fontSize: 18, fontWeight: 700, color: f.c ? c : "#AABBCC", whiteSpace: "nowrap", marginLeft: 8 }}>{f.r}</div>}
          </div>
          {i < fs.length - 1 && <div style={{ borderBottom: "1px solid #1A2744", marginTop: 5 }} />}
        </div>
      ))}
      <div style={{ borderTop: `2px solid ${c}`, paddingTop: 6, marginTop: 4, display: "flex", justifyContent: "space-between" }}>
        <span style={{ fontSize: 16, fontWeight: 700, color: c }}>合計</span>
        <span style={{ fontSize: 22, fontWeight: 900, color: c }}>{fm(total)}円/年</span>
      </div>
    </div>
  );
}

/* ===== Proposal Print ===== */
function generateProposalHTML(form, roi, isF, isT300) {
  const d = new Date();
  const ds = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const vp = VALUE_PRESETS.find(v => v.id === form.valuePreset) || VALUE_PRESETS[2];
  const rp = RECRUIT_PRESETS.find(r => r.id === form.recruitPreset) || RECRUIT_PRESETS[1];
  const title = `${isT300 ? "搬送" : "清掃"}ロボット導入 ROI提案書${isT300 && isF ? "【工場・呼出しボタン方式】" : ""}`;

  const layerHTML = (t, c, bg, formulas, total) => {
    const rows = formulas.map(f => `
      <tr><td style="padding:6px 0;border-bottom:1px solid #eee">
        <div>${f.l}</div>
        ${f.f ? `<div style="font-size:13px;color:#999;font-family:monospace">${f.f}</div>` : ""}
        ${f.n ? `<div style="font-size:12px;color:#888;font-style:italic">📊 ${f.n}</div>` : ""}
      </td><td style="padding:6px 0;border-bottom:1px solid #eee;text-align:right;font-weight:700;color:${f.c ? c : '#444'};white-space:nowrap">${f.r || ""}</td></tr>
    `).join("");
    return `
      <div style="margin-bottom:24px">
        <h3 style="font-size:15px;font-weight:900;border-left:4px solid #00BCD4;padding-left:10px;margin:0 0 10px">${t}</h3>
        <table style="width:100%;border-collapse:collapse;font-size:15px">${rows}</table>
        <div style="background:${bg};border-radius:6px;padding:8px 12px;margin-top:8px;display:flex;justify-content:space-between;font-weight:700;color:${c}">
          <span>合計</span><span style="font-size:18px">${fm(total)}円/年</span>
        </div>
      </div>`;
  };

  const factorySection = isT300 && isF ? `
    <div style="margin-bottom:24px">
      <h3 style="font-size:15px;font-weight:900;border-left:4px solid #00BCD4;padding-left:10px;margin:0 0 10px">呼出しボタン方式の導入効果</h3>

function downloadProposal(form, roi, isF, isT300) {
  const html = generateProposalHTML(form, roi, isF, isT300);
  const blob = new Blob([html], { type: "text/html;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `ROI提案書_${form.companyName || "御社"}_${new Date().toISOString().slice(0,10)}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
